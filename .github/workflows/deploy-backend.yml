name: Deploy backend to AWS Lambda

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      # Crée les tables en base (user, test). Optionnel : ajoute les secrets DATABASE_* dans GitHub.
      # Sinon, Lambda créera les tables au premier appel (cold start).
      - name: Sync database (créer les tables si absentes)
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
        run: npm run sync-db
        continue-on-error: true

      - name: Install Serverless CLI
        run: npm install -g serverless@3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::616421593714:role/official_github_deploy
          aws-region: eu-west-3

      - name: Deploy with Serverless
        run: npx serverless deploy

